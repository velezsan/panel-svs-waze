name: Escaneo de segmentos sin nombre

on:
  schedule:
    - cron: '17 9 * * *'   # todos los días a las 03:17 (hora de Ciudad de México)
  workflow_dispatch:
    inputs:
      modo:
        description: 'Modo de escaneo'
        type: choice
        default: completo
        options: [test, completo]
      minutos:
        description: 'Duración máxima en minutos'
        default: '240'

permissions:
  contents: write

concurrency:
  group: escaneo
  cancel-in-progress: false

jobs:
  escanear:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Correr escáner
        run: |
          python scanner/scan.py \
            --modo "${{ github.event.inputs.modo || 'completo' }}" \
            --minutos "${{ github.event.inputs.minutos || '240' }}"

      - name: Guardar resultados
        run: |
          git config user.name "escaner-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data state
          if git diff --cached --quiet; then
            echo "Sin cambios que guardar"
          else
            git commit -m "Escaneo automático $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          fi

