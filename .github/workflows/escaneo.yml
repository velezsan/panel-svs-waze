name: Escaneo de segmentos sin nombre

on:
  schedule:
    - cron: '17 */4 * * *'   # 6 veces al día, cada 4 horas (con 30 min de holgura entre corridas)
  workflow_dispatch:
    inputs:
      modo:
        description: 'Modo de escaneo'
        type: choice
        default: completo
        options: [test, completo]
      minutos:
        description: 'Duración máxima en minutos'
        default: '210'
      zona:
        description: 'Re-escaneo prioritario: estado, "lat,lon" o bbox (vacío = barrido normal)'
        default: ''

permissions:
  contents: write

concurrency:
  group: escaneo
  cancel-in-progress: false

jobs:
  escanear:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Correr escáner
        run: |
          python scanner/scan.py \
            --modo "${{ github.event.inputs.modo || 'completo' }}" \
            --minutos "${{ github.event.inputs.minutos || '210' }}" \
            --zona "${{ github.event.inputs.zona || '' }}"

      - name: Guardar resultados
        run: |
          git config user.name "escaner-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data state
          if git diff --cached --quiet; then
            echo "Sin cambios que guardar"
          else
            git commit -m "Escaneo automático $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          fi
